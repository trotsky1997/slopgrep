weight = 3

[[rules]]
id = "ai.zh.analysis"
language = "zh"
message = "中文：肤浅分析尾巴"
severity = "warning"
pattern = "(反映了[^，。；]{0,30}|象征着[^，。；]{0,30}|彰显[^，。；]{0,30}|展示了[^，。；]{0,30})"
